image: python:3.11-slim

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  REGISTRY: registry.most.network
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  NAMESPACE: most

stages:
  - test
  - build
  - migrate
  - deploy
  - smoke

# ─── Кеш зависимостей ────────────────────────────────────────────────────────
.python-cache: &python-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-python"
    paths:
      - .pip-cache/
  before_script:
    - pip install --cache-dir .pip-cache -r services/orchestrator/requirements.txt -q

# ─── STAGE: test ─────────────────────────────────────────────────────────────
test:unit:
  stage: test
  <<: *python-cache
  script:
    - pip install pytest pytest-asyncio httpx -q
    - |
      python -c "
      # Быстрый sanity-check: импорт модулей и проверка структуры
      import sys, os
      sys.path.insert(0, '.')
      
      # Risk Engine
      from services.risk_engine.main import RiskEngine
      e = RiskEngine()
      r = e.check_address('0x8589427373d6d84e98730d7795d8f6f8731fda16', 'ethereum')
      assert r['is_sanctioned'] == True, 'Sanctioned address not detected'
      assert r['recommendation'] == 'REJECT', 'Expected REJECT'
      
      r2 = e.check_address('0xAbCdEf1234567890abcdef1234', 'ethereum')
      assert r2['recommendation'] in ('APPROVE','MANUAL_REVIEW')
      
      print('✓ RiskEngine tests passed')
      "
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

test:lint:
  stage: test
  before_script:
    - pip install ruff -q
  script:
    - ruff check services/ libs/ --ignore E501,W503
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─── STAGE: build ────────────────────────────────────────────────────────────
.build-template: &build-template
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $REGISTRY
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

build:orchestrator:
  <<: *build-template
  script:
    - docker build -f services/orchestrator/Dockerfile -t $REGISTRY/most/orchestrator:$IMAGE_TAG -t $REGISTRY/most/orchestrator:latest .
    - docker push $REGISTRY/most/orchestrator:$IMAGE_TAG
    - docker push $REGISTRY/most/orchestrator:latest

build:coordinator:
  <<: *build-template
  script:
    - docker build -f services/swarm-coordinator/Dockerfile -t $REGISTRY/most/swarm-coordinator:$IMAGE_TAG -t $REGISTRY/most/swarm-coordinator:latest .
    - docker push $REGISTRY/most/swarm-coordinator:$IMAGE_TAG
    - docker push $REGISTRY/most/swarm-coordinator:latest

build:agent:
  <<: *build-template
  script:
    - docker build -f services/swarm-agent/Dockerfile -t $REGISTRY/most/swarm-agent:$IMAGE_TAG -t $REGISTRY/most/swarm-agent:latest .
    - docker push $REGISTRY/most/swarm-agent:$IMAGE_TAG
    - docker push $REGISTRY/most/swarm-agent:latest

build:risk-engine:
  <<: *build-template
  script:
    - docker build -f services/risk-engine/Dockerfile -t $REGISTRY/most/risk-engine:$IMAGE_TAG -t $REGISTRY/most/risk-engine:latest .
    - docker push $REGISTRY/most/risk-engine:$IMAGE_TAG
    - docker push $REGISTRY/most/risk-engine:latest

build:regulator:
  <<: *build-template
  script:
    - docker build -f services/regulator-node/Dockerfile -t $REGISTRY/most/regulator-node:$IMAGE_TAG -t $REGISTRY/most/regulator-node:latest .
    - docker push $REGISTRY/most/regulator-node:$IMAGE_TAG
    - docker push $REGISTRY/most/regulator-node:latest

# ─── STAGE: migrate ──────────────────────────────────────────────────────────
migrate:db:
  stage: migrate
  <<: *python-cache
  script:
    - pip install psycopg2-binary -q
    - |
      python -c "
      import psycopg2, os, glob
      conn = psycopg2.connect(os.environ['DATABASE_URL'])
      cur  = conn.cursor()
      for f in sorted(glob.glob('db_migrations/V*.sql')):
          print(f'Applying {f}...')
          cur.execute(open(f).read())
          conn.commit()
          print(f'  ✓ {f}')
      conn.close()
      print('All migrations applied')
      "
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  when: manual
  allow_failure: false

# ─── STAGE: deploy ───────────────────────────────────────────────────────────
.deploy-template: &deploy-template
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - kubectl config use-context $KUBE_CONTEXT
    - kubectl get namespace $NAMESPACE || kubectl create namespace $NAMESPACE
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:k8s:
  <<: *deploy-template
  script:
    # ConfigMap и Secrets
    - kubectl apply -f k8s/configmap.yaml
    - kubectl apply -f k8s/secret.yaml
    # Services
    - kubectl apply -f k8s/service.yaml
    # Deployments
    - kubectl apply -f k8s/deployment-orchestrator.yaml
    - kubectl apply -f k8s/deployment-coordinator.yaml
    # StatefulSet + KEDA
    - kubectl apply -f k8s/statefulset-agents.yaml
    # Ingress
    - kubectl apply -f k8s/ingress.yaml
    # Ждём готовности
    - kubectl rollout status deployment/orchestrator    -n $NAMESPACE --timeout=180s
    - kubectl rollout status deployment/swarm-coordinator -n $NAMESPACE --timeout=120s
    - kubectl rollout status statefulset/swarm-agent   -n $NAMESPACE --timeout=120s
  environment:
    name: production
    url: https://most.network

deploy:rollback:
  <<: *deploy-template
  script:
    - kubectl rollout undo deployment/orchestrator     -n $NAMESPACE
    - kubectl rollout undo deployment/swarm-coordinator -n $NAMESPACE
  when: manual
  environment:
    name: production

# ─── STAGE: smoke ────────────────────────────────────────────────────────────
smoke:api:
  stage: smoke
  image: curlimages/curl:latest
  script:
    - |
      BASE="https://api.most.network"
      
      echo "=== Smoke: /health ==="
      curl -sf "$BASE/health" | grep '"ok"' || exit 1
      echo "✓ Orchestrator healthy"
      
      echo "=== Smoke: Risk Engine ==="
      RISK=$(curl -sf -X POST "$BASE/api/v1/risk" \
        -H "Content-Type: application/json" \
        -d '{"address":"0xtest1234567890abcdef","network":"ethereum"}')
      echo "$RISK" | grep "risk_score" || exit 1
      echo "✓ Risk Engine responding"
      
      echo "=== Smoke: Auth Register ==="
      REG=$(curl -sf -X POST "$BASE/api/v1/auth/register" \
        -H "Content-Type: application/json" \
        -d "{\"email\":\"smoke-$CI_COMMIT_SHORT_SHA@test.most.network\",\"password\":\"SmokeTest123!\",\"company_name\":\"CI Smoke\",\"inn\":\"0000000000\"}")
      echo "$REG" | grep "access_token" || exit 1
      echo "✓ Registration OK"
      
      echo "All smoke tests passed ✓"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs: [deploy:k8s]
