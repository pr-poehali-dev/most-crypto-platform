<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOST — Swarm Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #020812;
      color: #e0f0ff;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    canvas { display: block; }

    /* ── HUD ─────────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .hud-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #00f5d4;
      text-shadow: 0 0 18px #00f5d488;
    }

    .hud-sub {
      font-size: 10px;
      letter-spacing: 0.22em;
      color: #4a7fa8;
      margin-top: -6px;
    }

    .hud-card {
      background: rgba(4, 18, 38, 0.75);
      border: 1px solid rgba(0, 245, 212, 0.18);
      border-radius: 10px;
      padding: 10px 16px;
      backdrop-filter: blur(10px);
      min-width: 220px;
    }

    .hud-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: #4a7fa8;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .hud-value {
      font-size: 26px;
      font-weight: 700;
      color: #00f5d4;
      text-shadow: 0 0 12px #00f5d466;
      line-height: 1;
    }

    .hud-row {
      display: flex;
      gap: 10px;
    }

    .hud-card.sm .hud-value { font-size: 20px; }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(0,245,212,0.12);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00f5d4, #a8ff78);
      border-radius: 4px;
      transition: width 0.6s ease;
      box-shadow: 0 0 8px #00f5d4aa;
    }

    /* ── WS status ──────────────────────────────────────── */
    #ws-badge {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(4,18,38,0.8);
      border: 1px solid rgba(0,245,212,0.2);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 11px;
      letter-spacing: 0.12em;
      backdrop-filter: blur(10px);
    }
    #ws-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
    }
    #ws-dot.connected   { background: #14f195; box-shadow: 0 0 8px #14f195; animation: blink 1.6s infinite; }
    #ws-dot.connecting  { background: #f3ba2f; box-shadow: 0 0 8px #f3ba2f; }
    #ws-dot.error       { background: #ff060a; box-shadow: 0 0 8px #ff060a; }

    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:.4; }
    }

    /* ── Network legend ─────────────────────────────────── */
    #legend {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      pointer-events: none;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(4,18,38,0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 10px;
      letter-spacing: 0.1em;
    }
    .leg-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Live feed ──────────────────────────────────────── */
    #feed {
      position: fixed;
      bottom: 68px;
      right: 24px;
      z-index: 20;
      width: 280px;
      max-height: 220px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }
    .feed-item {
      background: rgba(4,18,38,0.82);
      border: 1px solid rgba(0,245,212,0.12);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 10px;
      animation: slide-in 0.3s ease;
    }
    .feed-net  { font-weight: 700; }
    .feed-addr { color: #4a7fa8; font-size: 9px; }
    @keyframes slide-in {
      from { opacity:0; transform:translateX(20px); }
      to   { opacity:1; transform:translateX(0); }
    }

    /* ── City labels ─────────────────────────────────────── */
    .city-label {
      position: fixed;
      z-index: 15;
      font-size: 11px;
      letter-spacing: 0.12em;
      pointer-events: none;
      text-shadow: 0 0 10px currentColor;
    }
  </style>
</head>
<body>

<!-- ── HUD ──────────────────────────────────────────────── -->
<div id="hud">
  <div class="hud-title">MOST</div>
  <div class="hud-sub">SWARM PAYMENT NETWORK · REGULATOR VIEW</div>

  <div class="hud-card">
    <div class="hud-label">Активных агентов</div>
    <div class="hud-value" id="hud-agents">0</div>
    <div class="progress-bar"><div class="progress-fill" id="hud-progress" style="width:0%"></div></div>
  </div>

  <div class="hud-row">
    <div class="hud-card sm">
      <div class="hud-label">Выполнено TX</div>
      <div class="hud-value" id="hud-tx">0</div>
    </div>
    <div class="hud-card sm">
      <div class="hud-label">Прогресс</div>
      <div class="hud-value" id="hud-pct">0%</div>
    </div>
  </div>

  <div class="hud-card sm">
    <div class="hud-label">Сетей задействовано</div>
    <div class="hud-value" id="hud-nets">6</div>
  </div>
</div>

<!-- ── WS badge ─────────────────────────────────────────── -->
<div id="ws-badge">
  <div id="ws-dot"></div>
  <span id="ws-label">WS DEMO</span>
</div>

<!-- ── Legend ──────────────────────────────────────────── -->
<div id="legend"></div>

<!-- ── Live feed ──────────────────────────────────────── -->
<div id="feed"></div>

<!-- ── Three.js (ESM CDN) ─────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── Конфигурация сетей ──────────────────────────────────────────────────────
const NETWORKS = [
  { name: 'ETH',     color: '#627EEA' },
  { name: 'BSC',     color: '#F3BA2F' },
  { name: 'Polygon', color: '#8247E5' },
  { name: 'Tron',    color: '#FF060A' },
  { name: 'Solana',  color: '#14F195' },
  { name: 'Stellar', color: '#08B5E5' },
];

const NET_COLORS = NETWORKS.map(n => new THREE.Color(n.color));

// ─── Сцена ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x020812);
scene.fog = new THREE.FogExp2(0x020812, 0.08);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.6, 7);
camera.lookAt(0, 0, 0);

// Ambient + directional light
scene.add(new THREE.AmbientLight(0x0a1a2e, 3));
const dir = new THREE.DirectionalLight(0x00f5d4, 0.6);
dir.position.set(5, 5, 5);
scene.add(dir);

// ─── Глобус (wireframe sphere) ───────────────────────────────────────────────
const GLOBE_R = 2.6;

// Внешняя каркасная сфера
const globeGeo  = new THREE.SphereGeometry(GLOBE_R, 36, 24);
const globeMat  = new THREE.MeshBasicMaterial({
  color: 0x0d3a5c,
  wireframe: true,
  transparent: true,
  opacity: 0.22,
});
const globe = new THREE.Mesh(globeGeo, globeMat);
scene.add(globe);

// Внутреннее свечение (solid sphere, очень прозрачная)
const innerMat = new THREE.MeshBasicMaterial({
  color: 0x041225,
  transparent: true,
  opacity: 0.85,
  side: THREE.BackSide,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(GLOBE_R * 0.995, 36, 24), innerMat));

// Экваториальное кольцо
const ringGeo = new THREE.TorusGeometry(GLOBE_R, 0.008, 4, 120);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f5d4, transparent: true, opacity: 0.35 });
scene.add(new THREE.Mesh(ringGeo, ringMat));

// ─── Точки городов ────────────────────────────────────────────────────────────
// Координаты на поверхности глобуса (Three.js spherical: Y вверх)
// lat/lon → 3D: x=R·cos(lat)·sin(lon), y=R·sin(lat), z=R·cos(lat)·cos(lon)
function latLonTo3D(lat, lon, r = GLOBE_R) {
  const phi   = (90 - lat)  * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta),
  );
}

// Москва: 55.75°N 37.62°E  → точка -1, 0.5, 4.5 (по спецификации)
// Стамбул: 41.01°N 28.95°E → точка 0.5, 0.5, 4.5 (по спецификации)
const CITIES = [
  { name: 'МОСКВА',   pos: new THREE.Vector3(-1,   0.5, 4.5), color: 0xff3b3b, labelColor: '#ff3b3b' },
  { name: 'СТАМБУЛ',  pos: new THREE.Vector3( 0.5, 0.5, 4.5), color: 0x14f195, labelColor: '#14f195' },
];

const cityMeshes = [];
CITIES.forEach(city => {
  // Пульсирующая точка
  const geo  = new THREE.SphereGeometry(0.055, 12, 12);
  const mat  = new THREE.MeshBasicMaterial({ color: city.color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(city.pos);
  scene.add(mesh);
  cityMeshes.push({ mesh, mat, city, phase: Math.random() * Math.PI * 2 });

  // Ореол
  const haloGeo = new THREE.SphereGeometry(0.11, 12, 12);
  const haloMat = new THREE.MeshBasicMaterial({
    color: city.color, transparent: true, opacity: 0.18,
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  halo.position.copy(city.pos);
  scene.add(halo);
});

// ─── Легенда городов (CSS overlay) ──────────────────────────────────────────
function project3DToScreen(vec3) {
  const v = vec3.clone().project(camera);
  return {
    x: (v.x * 0.5 + 0.5) * window.innerWidth,
    y: (-v.y * 0.5 + 0.5) * window.innerHeight,
  };
}

function updateCityLabels() {
  CITIES.forEach((city, i) => {
    let el = document.getElementById(`city-label-${i}`);
    if (!el) {
      el = document.createElement('div');
      el.id = `city-label-${i}`;
      el.className = 'city-label';
      el.style.color = city.labelColor;
      el.textContent = city.name;
      document.body.appendChild(el);
    }
    const s = project3DToScreen(city.pos);
    el.style.left = `${s.x + 10}px`;
    el.style.top  = `${s.y - 6}px`;
  });
}

// ─── Легенда сетей ──────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
NETWORKS.forEach(n => {
  const item = document.createElement('div');
  item.className = 'leg-item';
  item.innerHTML = `<div class="leg-dot" style="background:${n.color};box-shadow:0 0 6px ${n.color}"></div>${n.name}`;
  legendEl.appendChild(item);
});

// ─── Агенты роя ──────────────────────────────────────────────────────────────
const AGENT_COUNT = 60;
const agents = [];
let completedTx = 0;
let activeCount = 0;

// Для каждого агента: случайная точка отправки и назначения на поверхности глобуса
// Создаём инстансированный меш для производительности
const agentGeo  = new THREE.SphereGeometry(0.024, 6, 6);
const agentMats = NETWORKS.map(n => new THREE.MeshBasicMaterial({ color: new THREE.Color(n.color) }));

function randomSurfacePoint(r = GLOBE_R) {
  const phi   = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta),
  );
}

// Квадратичная кривая Безье по поверхности
function bezierPoint(p0, p2, t) {
  // Контрольная точка — выступ над поверхностью
  const mid = p0.clone().add(p2).multiplyScalar(0.5);
  const lift = mid.length();
  const p1 = mid.normalize().multiplyScalar(lift * 1.55);

  // B(t) = (1-t)²·P0 + 2(1-t)t·P1 + t²·P2
  const mt = 1 - t;
  return new THREE.Vector3(
    mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x,
    mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y,
    mt * mt * p0.z + 2 * mt * t * p1.z + t * t * p2.z,
  );
}

// Трейл (шлейф агента)
function createTrail(color) {
  const MAX_TRAIL = 30;
  const positions = new Float32Array(MAX_TRAIL * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setDrawRange(0, 0);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.5 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  return { line, positions, count: 0, MAX_TRAIL };
}

function spawnAgent() {
  const netIdx  = Math.floor(Math.random() * NETWORKS.length);
  const color   = NET_COLORS[netIdx];

  // Иногда агент летит между городами
  let src, dst;
  const r = Math.random();
  if (r < 0.3) {
    src = CITIES[0].pos.clone();
    dst = CITIES[1].pos.clone();
  } else if (r < 0.5) {
    src = CITIES[1].pos.clone();
    dst = randomSurfacePoint();
  } else {
    src = randomSurfacePoint();
    dst = randomSurfacePoint();
  }

  const mesh  = new THREE.Mesh(agentGeo, agentMats[netIdx]);
  scene.add(mesh);

  const trail = createTrail(color);
  const speed = 0.004 + Math.random() * 0.006;

  return { mesh, trail, src, dst, t: 0, speed, netIdx, color, done: false };
}

// Инициализируем агентов со смещением фаз
for (let i = 0; i < AGENT_COUNT; i++) {
  const a = spawnAgent();
  a.t = Math.random();          // стаггер
  agents.push(a);
}
activeCount = AGENT_COUNT;

// Подсветка маршрутной дуги (dim lines)
const arcLines = [];
function addArcLine(src, dst, color) {
  const pts = [];
  for (let i = 0; i <= 40; i++) {
    pts.push(bezierPoint(src, dst, i / 40));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.06 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  arcLines.push({ line, ttl: 4.0 });
}

// ─── HUD обновление ──────────────────────────────────────────────────────────
const hudAgents   = document.getElementById('hud-agents');
const hudTx       = document.getElementById('hud-tx');
const hudPct      = document.getElementById('hud-pct');
const hudProgress = document.getElementById('hud-progress');
const hudNets     = document.getElementById('hud-nets');

const TOTAL_AGENTS = AGENT_COUNT * 10;   // виртуальный суммарный рой
let displayTx = 0;
let displayPct = 0;

// ─── Живая лента транзакций ─────────────────────────────────────────────────
const feedEl = document.getElementById('feed');
function pushFeed(netName, color, addr) {
  const item = document.createElement('div');
  item.className = 'feed-item';
  item.innerHTML =
    `<span class="feed-net" style="color:${color}">${netName}</span> `+
    `<span style="color:#7ad4c0">→ TX confirmed</span><br>`+
    `<span class="feed-addr">${addr}</span>`;
  feedEl.prepend(item);
  if (feedEl.children.length > 8) feedEl.lastChild.remove();
}

function fakeAddr() {
  const hex = '0123456789abcdef';
  let s = '0x';
  for (let i = 0; i < 8; i++) s += hex[Math.floor(Math.random()*16)];
  return s + '…' + Array.from({length:4},()=>hex[Math.floor(Math.random()*16)]).join('');
}

// ─── WebSocket ───────────────────────────────────────────────────────────────
const wsDot   = document.getElementById('ws-dot');
const wsLabel = document.getElementById('ws-label');
let ws = null;
let wsPaymentId = new URLSearchParams(window.location.search).get('payment_id') || 'demo';

function connectWS() {
  if (wsPaymentId === 'demo') {
    wsDot.className  = 'connected';
    wsLabel.textContent = 'WS · DEMO MODE';
    return;
  }

  const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${protocol}://${location.hostname}:8000/ws/payments/${wsPaymentId}/live`;

  wsDot.className = 'connecting';
  wsLabel.textContent = 'WS · CONNECTING';

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    wsDot.className = 'connected';
    wsLabel.textContent = `WS · LIVE · ${wsPaymentId.slice(0, 8)}`;
  };

  ws.onmessage = (ev) => {
    try {
      const data = JSON.parse(ev.data);
      if (data.completed_agents !== undefined) {
        completedTx = data.completed_agents;
        activeCount = data.total_agents || AGENT_COUNT;
      }
    } catch {}
  };

  ws.onerror = () => {
    wsDot.className = 'error';
    wsLabel.textContent = 'WS · ERROR';
  };

  ws.onclose = () => {
    wsDot.className = '';
    wsLabel.textContent = 'WS · CLOSED';
    setTimeout(connectWS, 4000);
  };
}

connectWS();

// ─── Старз (фоновые звёзды) ──────────────────────────────────────────────────
{
  const starCount  = 1800;
  const positions  = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 18 + Math.random() * 10;
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.cos(phi);
    positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0x4488aa, size: 0.04, transparent: true, opacity: 0.55 });
  scene.add(new THREE.Points(geo, mat));
}

// ─── Ресайз ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Анимация ────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frameCount = 0;
let simTx = 0;    // симулируемые TX для demo-режима

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();
  frameCount++;

  // Медленное вращение глобуса
  globe.rotation.y += delta * 0.06;

  // Пульсация городских точек
  cityMeshes.forEach(({ mesh, mat, city, phase }) => {
    const s = 1 + 0.3 * Math.sin(elapsed * 2.5 + phase);
    mesh.scale.setScalar(s);
  });

  // Обновление агентов
  let activeNow = 0;
  agents.forEach(a => {
    if (a.done) return;
    a.t += a.speed;
    activeNow++;

    const pos = bezierPoint(a.src, a.dst, Math.min(a.t, 1.0));
    a.mesh.position.copy(pos);

    // Трейл
    const tr = a.trail;
    const N  = tr.MAX_TRAIL;
    // сдвигаем историю
    for (let i = N - 1; i > 0; i--) {
      tr.positions[i*3]   = tr.positions[(i-1)*3];
      tr.positions[i*3+1] = tr.positions[(i-1)*3+1];
      tr.positions[i*3+2] = tr.positions[(i-1)*3+2];
    }
    tr.positions[0] = pos.x;
    tr.positions[1] = pos.y;
    tr.positions[2] = pos.z;
    tr.count = Math.min(tr.count + 1, N);
    tr.line.geometry.attributes.position.needsUpdate = true;
    tr.line.geometry.setDrawRange(0, tr.count);

    if (a.t >= 1.0) {
      // Агент завершил маршрут
      a.done = true;
      simTx++;
      scene.remove(a.mesh);
      scene.remove(a.trail.line);

      // Добавить дуговую линию-след
      addArcLine(a.src, a.dst, a.color);

      // Пушим в ленту каждую 3-ю TX
      if (simTx % 3 === 0) {
        pushFeed(NETWORKS[a.netIdx].name, NETWORKS[a.netIdx].color, fakeAddr());
      }

      // Перерождаем агента
      const idx = agents.indexOf(a);
      agents[idx] = spawnAgent();
    }
  });

  // Затухание дуговых линий
  for (let i = arcLines.length - 1; i >= 0; i--) {
    arcLines[i].ttl -= delta;
    arcLines[i].line.material.opacity = Math.max(0, arcLines[i].ttl * 0.015);
    if (arcLines[i].ttl <= 0) {
      scene.remove(arcLines[i].line);
      arcLines.splice(i, 1);
    }
  }

  // HUD
  if (frameCount % 6 === 0) {
    const txDisplay = wsPaymentId === 'demo' ? simTx : completedTx;
    const total     = wsPaymentId === 'demo' ? Math.max(simTx + activeNow, TOTAL_AGENTS) : (activeCount || TOTAL_AGENTS);
    const pct       = Math.min(100, Math.round((txDisplay / total) * 100));

    hudAgents.textContent = activeNow;
    hudTx.textContent     = txDisplay.toLocaleString();
    hudPct.textContent    = pct + '%';
    hudProgress.style.width = pct + '%';
    hudNets.textContent   = NETWORKS.length;
  }

  // Обновление лейблов городов
  updateCityLabels();

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
