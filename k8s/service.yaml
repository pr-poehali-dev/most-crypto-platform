---
# ── Orchestrator ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: most
  labels:
    app: orchestrator
spec:
  type: ClusterIP
  selector:
    app: orchestrator
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP

---
# ── Swarm Coordinator ────────────────────────────────────────────────────────
apiVersion: v1
