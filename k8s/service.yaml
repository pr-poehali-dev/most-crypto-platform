metadata:
  name: swarm-coordinator
  namespace: most
  labels:
    app: swarm-coordinator
spec:
  type: ClusterIP
  selector:
    app: swarm-coordinator
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP

