apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: most-ingress
  namespace: most
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # WebSocket поддержка для /ws/ путей
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # SSL
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, X-API-Key, X-Regulator-Key, Content-Type"
spec:
  tls:
    - hosts:
        - most.network
        - api.most.network
        - regulator.most.network
      secretName: most-tls-cert
  rules:
    # ── Публичный фронтенд ───────────────────────────────────────────────────
    - host: most.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000

    # ── API ──────────────────────────────────────────────────────────────────
    - host: api.most.network
      http:
        paths:
          # Auth + Payments → Orchestrator
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: orchestrator
                port:
                  number: 8000
          - path: /api/v1/payments
            pathType: Prefix
            backend:
              service:
                name: orchestrator
                port:
                  number: 8000
          # WebSocket live updates
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: orchestrator
                port:
                  number: 8000
          # Risk Engine
          - path: /api/v1/risk
            pathType: Prefix
            backend:
              service:
                name: risk-engine
                port:
                  number: 8002
          # Swarm Coordinator
          - path: /api/v1/swarm
            pathType: Prefix
            backend:
              service:
                name: swarm-coordinator
                port:
                  number: 8001

    # ── Regulator Node (отдельный хост, дополнительная защита) ───────────────
    - host: regulator.most.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: regulator-node
                port:
                  number: 8003
