apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarm-coordinator
  namespace: most
  labels:
    app: swarm-coordinator
    component: coordinator
    version: "0.3.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: swarm-coordinator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: swarm-coordinator
        component: coordinator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8001"
    spec:
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [swarm-coordinator]
              topologyKey: kubernetes.io/hostname
      containers:
        - name: swarm-coordinator
          image: registry.most.network/most/swarm-coordinator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
              protocol: TCP
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: most-secrets
                  key: REDIS_URL
            - name: ENV
              value: "production"
          resources:
            requests:
              cpu: "150m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      imagePullSecrets:
        - name: registry-credentials
